version: 2

models:
  - name: int_account_activity_weekly
    description: >
      Account × week spine with product usage aggregates.
      Covers a rolling 12-week history. Incremental on week_start.
      Grain: one row per account_id × week_start (Monday).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - account_id
              - week_start
    columns:
      - name: account_id
        tests:
          - not_null
      - name: week_start
        tests:
          - not_null
      - name: wau
        tests:
          - not_null
      - name: updated_at
        tests:
          - not_null

  - name: int_churn_features
    description: >
      One row per account: latest-week feature set ready for scoring.
      Support + billing signals are stubbed until Session 2.
      Grain: one row per account_id (current week snapshot).
    columns:
      - name: account_id
        tests:
          - not_null
          - unique
      - name: feature_week
        tests:
          - not_null

  - name: int_account_support_signals
    description: >
      Per-account support health aggregates from stg_support_tickets.
      Grain: one row per account_id.
    columns:
      - name: account_id
        tests:
          - not_null
          - unique
      - name: open_tickets_count
        tests:
          - not_null
      - name: p1_p2_tickets_30d
        tests:
          - not_null

  - name: int_account_billing_signals
    description: >
      Per-account billing health and seat utilization signals.
      Sources: stg_billing_events, stg_product_events, stg_accounts.
      Grain: one row per account_id.
    columns:
      - name: account_id
        tests:
          - not_null
          - unique
      - name: had_payment_failure_30d
        tests:
          - not_null
      - name: had_downgrade_90d
        tests:
          - not_null
