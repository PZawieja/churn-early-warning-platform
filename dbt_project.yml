name: churn_early_warning
version: '1.0.0'
config-version: 2

profile: churn_early_warning

model-paths: ["models"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
seed-paths: ["seeds"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # DuckDB dev: matches 'path: dev.duckdb' in profiles.yml (dev = filename without extension)
  # Snowflake prod: override with --vars '{"raw_database": "YOUR_DB", "raw_schema": "raw"}'
  raw_database: 'dev'
  raw_schema: 'raw'

seeds:
  churn_early_warning:
    +schema: raw       # seeds land in raw schema → matches _sources.yml

models:
  churn_early_warning:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
