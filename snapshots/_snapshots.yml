version: 2

snapshots:
  - name: snp_churn_risk_scores
    description: >
      SCD Type 2 history of account risk scores. Captures every risk_tier or risk_score
      change per account. Powers consecutive_high_weeks and first_alerted_at in
      mart_churn_alerts. Grain: one current row per account_id (dbt_valid_to is null).
    columns:
      - name: account_id
        tests:
          - not_null
      - name: risk_tier
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['HIGH', 'MEDIUM', 'LOW']
      - name: dbt_scd_id
        description: Surrogate key generated by dbt — unique per snapshot row.
        tests:
          - not_null
          - unique
      - name: dbt_valid_from
        tests:
          - not_null
      - name: dbt_valid_to
        description: >
          NULL for the current (active) record. Set to the change timestamp when
          the account's risk_tier or risk_score changes in a subsequent snapshot run.
